services:
  - type: web
    name: student-counseling-app
    env: python
    region: oregon
    plan: free
    buildCommand: pip install -r requirements.txt && python manage.py collectstatic --noinput && python manage.py migrate
    startCommand: gunicorn new.wsgi:application --bind 0.0.0.0:$PORT --workers 2
    envVars:
      - key: SECRET_KEY
        scope: build
      - key: DEBUG
        value: false
      - key: ALLOWED_HOSTS
        value: .onrender.com,127.0.0.1
      - key: TWILIO_ACCOUNT_SID
        scope: build
      - key: TWILIO_AUTH_TOKEN
        scope: build
      - key: TWILIO_PHONE_NUMBER
        scope: build
