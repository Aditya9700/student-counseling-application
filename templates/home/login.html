<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Page</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Poppins', sans-serif; }
    .h-custom { height: calc(100% - 73px); }
    @media (max-width: 450px) { .h-custom { height: 100%; } }
    .page-title { font-weight: 600; font-size: 1.5rem; color: #2c3e50; }
    .or-divider { text-align: center; margin: 1px 0; font-weight: 500; color: #7f8c8d; }
    .footer-dark { background-color: #212529; color: #f8f9fa; }
  </style>
</head>
<body>
<section class="vh-100">
  <div class="container-fluid h-custom">
    <div class="row d-flex justify-content-center align-items-center h-100">
      <div class="col-md-9 col-lg-6 col-xl-5">
        <img src="https://mdbcdn.b-cdn.net/img/Photos/new-templates/bootstrap-login-form/draw2.webp" 
             class="img-fluid" alt="Sample image">
      </div>
      <div class="col-md-8 col-lg-6 col-xl-4 offset-xl-1">
        <div class="text-center mb-4">
          <h3 class="page-title">🎓 Students Counseling Web ✨ Application<br>User Login</h3>
        </div>

        <!-- Login Form -->
        <form method="post" action="/login">
          {% csrf_token %}
          
          <!-- Username/Email -->
          <div class="form-outline mb-3">
            <input type="text" name="username" id="formUsername" class="form-control form-control-lg" 
                   placeholder="Enter your username" required />
            <label class="form-label" for="formUsername">Username</label>
          </div>

          <!-- Password field -->
          <div class="form-outline mb-3">
            <input type="password" name="password" id="formPassword" class="form-control form-control-lg" 
                   placeholder="Enter password (optional)" />
            <label class="form-label" for="formPassword">Password</label>
          </div>

          {% comment %} <div class="or-divider">or</div> {% endcomment %}

          <!-- Phone input with Send OTP -->
          <div class="input-group mb-3">
            <input type="tel" name="phone" id="formPhone" class="form-control form-control-lg" 
                   placeholder="Enter your phone number (e.g. +919876543210)" />
            <button type="button" class="btn btn-outline-primary" id="sendOtpBtn">Send OTP</button>
          </div>

          <!-- OTP input -->
          <div class="form-outline mb-3">
            <input type="text" name="otp" id="formOtp" class="form-control form-control-lg" 
                   placeholder="Enter OTP (optional)" />
            <label class="form-label" for="formOtp">One-Time Password (OTP)</label>
          </div>

          <!-- Remember Me -->
          <div class="form-check mb-3">
            <input class="form-check-input" type="checkbox" value="remember-me" id="rememberMe" />
            <label class="form-check-label" for="rememberMe"> Remember me </label>
          </div>

          <!-- Submit -->
          <div class="text-center text-lg-start mt-4 pt-2">
            <button type="submit" class="btn btn-primary btn-lg px-5">Login</button>
            <p class="small fw-bold mt-2 pt-1 mb-0">
              Don't have an account? <a href="/register" class="link-danger">Register</a>
            </p>
          </div>

          <!-- Error message (Django will render if passed) -->
          {% if error %}
          <div class="alert alert-danger mt-3">{{ error }}</div>
          {% endif %}
        </form>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer-dark d-flex flex-column flex-md-row text-center text-md-start 
              justify-content-between py-3 px-4 px-xl-5" 
       style="width:100%; position:fixed; bottom:0; left:0;">
    <div class="mb-2 mb-md-0">&copy; 2025. All rights reserved.</div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

<script>
// Helper: get CSRF token
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
const csrftoken = getCookie('csrftoken');

// Handle Send OTP click
document.getElementById('sendOtpBtn').addEventListener('click', function() {
    const phone = document.getElementById('formPhone').value.trim();
    if (!phone) { 
        alert("Enter phone number!"); 
        return; 
    }

    fetch("/send-otp", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded",
            "X-CSRFToken": csrftoken
        },
        body: `phone=${encodeURIComponent(phone)}`
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            alert("✅ OTP sent! Check your phone.");
        } else {
            alert("⚠️ " + data.error);
        }
    })
    .catch(error => { console.error(error); alert("Something went wrong!"); });
});
</script>
</body>
</html>
