<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Registration</title>

  <!-- Bootstrap CSS -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

  <!-- Google Fonts -->
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">

  <style>
    body {
      font-family: 'Poppins', sans-serif;
    }
    .page-title {
      font-weight: 600;
      font-size: 1.5rem;
      color: #2c3e50;
    }
    .form-outline {
      margin-bottom: 15px !important;
    }
    .btn-lg {
      padding: 10px 25px;
      border-radius: 8px;
    }
    #otp-status {
      margin-top: 8px;
      font-size: 0.9rem;
    }
  </style>
</head>
<body>

<section class="vh-100">
  <div class="container h-custom">
    <div class="row d-flex justify-content-center align-items-center h-100">
      <div class="col-md-9 col-lg-6 col-xl-5">
        <img src="https://mdbcdn.b-cdn.net/img/Photos/new-templates/bootstrap-login-form/draw2.webp"
          class="img-fluid" alt="Sample image">
      </div>
      <div class="col-md-8 col-lg-6 col-xl-4 offset-xl-1">

        <!-- 🎓 Title above form -->
        <div class="text-center mb-3">
          <h4 class="page-title"><br>User Registration</h4>
          <h3 class="page-title">🎓 Students Counseling Web ✨ Application<br></h3>
        </div>

        <!-- ✅ Django Register Form -->
        <form method="post" action="/register/">
          {% csrf_token %}

          <!-- Full Name -->
          <div class="form-outline">
            <input type="text" name="name" class="form-control form-control-lg"
              placeholder="Enter your full name" required />
            <label class="form-label">Full Name</label>
          </div>

          <!-- Email -->
          <div class="form-outline">
            <input type="email" name="email" class="form-control form-control-lg"
              placeholder="Enter your email address" required />
            <label class="form-label">Email address</label>
          </div>

          <!-- Phone -->
          <div class="form-outline">
            <input type="tel" name="phone" id="phone" class="form-control form-control-lg"
              placeholder="Enter your phone number with country code (e.g. +91...)" required />
            <label class="form-label">Phone Number</label>
          </div>

          <!-- OTP -->
          <div class="input-group mb-2">
            <input type="text" name="otp" class="form-control form-control-lg"
              placeholder="Enter OTP" required />
            <button type="button" id="send-otp-btn" class="btn btn-outline-primary">Send OTP</button>
          </div>
          <div id="otp-status"></div>

          <!-- Password -->
          <div class="form-outline">
            <input type="password" name="password" class="form-control form-control-lg"
              placeholder="Set a strong password" required />
            <label class="form-label">Password</label>
          </div>

          <!-- Register Button -->
          <div class="text-center mt-4">
            <button type="submit" class="btn btn-success btn-lg">Register</button>
            <p class="small fw-bold mt-2">Already have an account? 
              <a href="/login" class="link-danger">Login</a>
            </p>
          </div>
        </form>
      </div>
    </div>
  </div>

  <!-- Footer -->
  <div class="footer-dark d-flex flex-column flex-md-row text-center text-md-start justify-content-between py-3 px-4 px-xl-5" style="width:100%; position:fixed; bottom:0; left:0; background-color:#212529; color:#fff;">
    <div>&copy; 2025. All rights reserved.</div>
  </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script>
document.getElementById("send-otp-btn").addEventListener("click", function() {
    const phone = document.getElementById("phone").value;
    const statusDiv = document.getElementById("otp-status");
    const btn = this;

    if (!phone) {
        statusDiv.innerHTML = "<span class='text-danger'>⚠️ Please enter phone number first</span>";
        return;
    }

    btn.disabled = true;
    statusDiv.innerHTML = "<span class='text-info'>⏳ Sending OTP...</span>";

    fetch("/send-otp/", {
        method: "POST",
        headers: {
            "Content-Type": "application/x-www-form-urlencoded",
            "X-CSRFToken": "{{ csrf_token }}",
        },
        body: "phone=" + encodeURIComponent(phone),
    })
    .then(response => response.json())
    .then(data => {
        if (data.success) {
            statusDiv.innerHTML = "<span class='text-success'>✅ " + data.message + "</span>";
        } else {
            statusDiv.innerHTML = "<span class='text-danger'>❌ " + data.message + "</span>";
        }
        btn.disabled = false;
    })
    .catch(error => {
        statusDiv.innerHTML = "<span class='text-danger'>⚠️ Error sending OTP</span>";
        btn.disabled = false;
    });
});
</script>

</body>
</html>
